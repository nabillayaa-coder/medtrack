{% extends "base.html" %}
{% block title %}Add Medication — MedTrack{% endblock %}

{% block content %}
<div class="form-page">
  <div class="form-card">
    <a href="/dashboard" class="back-link">← Back</a>
    <h1 class="page-title">Add Medication</h1>
    <p class="page-sub">Fill in your medication details below.</p>

    <form method="POST" action="/medications/add" class="auth-form">
      <div class="field">
        <label for="name">Medication Name</label>
        <input type="text" id="name" name="name" placeholder="e.g. Amoxicillin" required />
      </div>
      <div class="field">
        <label for="dosage">Dosage</label>
        <input type="text" id="dosage" name="dosage" placeholder="e.g. 500mg" required />
      </div>
      <div class="field">
        <label for="frequency">Frequency</label>
        <select id="frequency" name="frequency" required>
          <option value="">Select frequency...</option>
          <option value="Once daily">Once daily</option>
          <option value="Twice daily">Twice daily</option>
          <option value="Three times daily">Three times daily</option>
          <option value="Every 8 hours">Every 8 hours</option>
          <option value="Every 12 hours">Every 12 hours</option>
          <option value="Weekly">Weekly</option>
          <option value="As needed">As needed</option>
        </select>
      </div>
      <div class="field">
        <label for="notes">Notes <span style="text-transform:none;font-weight:400;color:#6b6b80">(optional)</span></label>
        <textarea id="notes" name="notes" placeholder="e.g. Take with food..." rows="3"></textarea>
      </div>
      <button type="submit" class="btn btn-primary btn-full">Save Medication</button>
    </form>
  </div>
</div>
{% endblock %}
